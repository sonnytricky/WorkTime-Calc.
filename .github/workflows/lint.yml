name: Lint Code

on:
  push:
    branches: [main]
    paths:
      - "**/*.js"
  pull_request:
    branches: [main]
    paths:
      - "**/*.js"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - run: npm run lint .