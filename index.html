<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>WorkTime-Calc.</title>

<body>

  <div class="app", >
    <div class="main-card">


    <h2>Arbeitszeit</h2>

    <div class="card">
      <h3>Vormittagspause</h3>
      <input type="time" id="vmPauseStart">
      <input type="time" id="vmPauseEnde">
      <p>Pausen Dauer: <span id="vmErgebnis">0</span> min</p>
    </div>

    <div class="card">
      <h3>Mittagspause</h3>
      <input type="time" id="mittagsPauseStart">
      <input type="time" id="mittagsPauseEnde">
      <p>Pausen Dauer: <span id="mittagsErgebnis">0</span> min</p>
    </div>

    <div class="card">
      <h3>Nachmittagspause</h3>
      <input type="time" id="nmPauseStart">
      <input type="time" id="nmPauseEnde">
      <p>Pausen Dauer: <span id="nmErgebnis">0</span> min</p>
    </div>

    <div>
      <p>Feierabend: <span id="feierabend">0</span> min</p>
      <button class="btn">Berechnen</button>
    </div>

  </div>
</div>


  <script src="worktimecalc.js"></script>

</body>
</html>
